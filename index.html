<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기억조작 자판기</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DungGeunMo&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #d4d4d4; font-family: 'DungGeunMo', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .mac-window { background-color: #e0e0e0; border: 2px solid #000; width: 100%; max-width: 400px; box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; }
        .title-bar { background-color: #fff; border-bottom: 2px solid #000; padding: 6px 10px; display: flex; align-items: center; font-size: 14px; background-image: repeating-linear-gradient(to bottom, #fff, #fff 2px, #000 2px, #000 3px); }
        .title-text { background-color: #fff; padding: 0 10px; margin: 0 auto; border: 2px solid #000; font-weight: bold; }
        .content { padding: 20px; background-color: #ffffff; border: 2px solid #000; margin: 10px; text-align: center; }
        .slot { border: 2px dashed #888; padding: 15px; margin-bottom: 15px; background-color: #f9f9f9; }
        .slot p { margin: 0 0 10px 0; font-size: 14px; }
        input[type="file"] { font-family: 'DungGeunMo'; font-size: 12px; }
        .mac-button { background-color: #e0e0e0; border: 2px solid #000; border-top-color: #fff; border-left-color: #fff; padding: 12px 20px; font-family: 'DungGeunMo'; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; color: #333; }
        .mac-button:active { border: 2px solid #000; border-bottom-color: #fff; border-right-color: #fff; background-color: #ccc; }
        .twitter-btn { background-color: #1DA1F2; color: white; border-top-color: #6bc0f8; border-left-color: #6bc0f8; }
        #loading-screen, #result-screen { display: none; }
        .cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .photo-frame { border: 10px solid #fff; border-bottom: 35px solid #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); margin-bottom: 20px; background-color: #eee; height: 250px; display: flex; align-items: center; justify-content: center; color: #888; }
    </style>
</head>
<body>

    <div class="mac-window">
        <div class="title-bar"><div class="title-text">기억조작_자판기.app</div></div>
        
        <div class="content" id="upload-screen">
            <p style="font-size: 14px; color: #555;">[ System: 서랍 속 추억을 복원합니다 ]</p>
            <div class="slot"><p>▶ 인물 1 (Face_A)</p><input type="file" accept="image/*"></div>
            <div class="slot"><p>▶ 인물 2 (Face_B)</p><input type="file" accept="image/*"></div>
            <button class="mac-button" onclick="startLoading()">✨ 잊혀진 기억 인화하기</button>
        </div>

        <div class="content" id="loading-screen">
            <br><br><h2 id="loading-text" style="font-size: 16px;">기억의 파편 모으는 중...<span class="cursor">_</span></h2><br><br>
            <p style="font-size: 12px; color: #888;">잠시만 기다려 주십시오.</p>
        </div>

        <div class="content" id="result-screen">
            <div class="photo-frame">(여기에 AI가 만든 사진이 들어갑니다)</div>
            <p style="font-size: 12px; color: #555;">💡 이미지를 꾹 눌러서 저장하세요!</p>
            <button class="mac-button twitter-btn" onclick="shareTwitter()">🐦 X (트위터)에 자랑하기</button>
            <button class="mac-button" onclick="retry()">🔄 다른 셀카 인화하기</button>
        </div>
    </div>

    <script>
        function startLoading() {
            document.getElementById("upload-screen").style.display = "none";
            document.getElementById("loading-screen").style.display = "block";
            let loadingText = document.getElementById("loading-text");

            setTimeout(() => { loadingText.innerHTML = "2015년의 새벽 공기 주입하는 중...<span class='cursor'>_</span>"; }, 1500);
            setTimeout(() => { loadingText.innerHTML = "서로를 바라보는 눈빛의 온도 계산 중...<span class='cursor'>_</span>"; }, 3000);
            setTimeout(() => { loadingText.innerHTML = "렌즈에 아련한 노이즈 한 꼬집 흩뿌리는 중...<span class='cursor'>_</span>"; }, 4500);
            setTimeout(() => { loadingText.innerHTML = "시공간을 구부려 아이폰 6S에 욱여넣는 중...<span class='cursor'>_</span>"; }, 6000);
            setTimeout(() => {
                document.getElementById("loading-screen").style.display = "none";
                document.getElementById("result-screen").style.display = "block";
            }, 7500); 
        }

        function retry() {
            document.getElementById("result-screen").style.display = "none";
            document.getElementById("upload-screen").style.display = "block";
            document.getElementById("loading-text").innerHTML = "기억의 파편 모으는 중...<span class='cursor'>_</span>";
        }

        // 트위터 랜덤 멘트 기능!
        function shareTwitter() {
            const messages = [
                "2015년 서랍 속에서 발견된 기억조작 투샷 📸",
                "시공간을 구부려 얻어낸 그 시절 우리의 셀카 ✨",
                "렌즈에 낀 먼지까지 완벽한 레트로 감성 복원 💾",
                "알 수 없는 오류로 인화된 6S 감성 셀카..."
            ];
            // 4개 중 하나를 랜덤으로 뽑습니다
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            const hashtag = "\n\n#기억조작_자판기";
            
            // 트위터 작성 창으로 이동 (멘트 자동 입력)
            const twitterUrl = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(randomMsg + hashtag);
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
</html>
