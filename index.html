<script>
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function startLoading() {
            const fileInputs = document.querySelectorAll('input[type="file"]');
            const file1 = fileInputs[0].files[0];
            const file2 = fileInputs[1].files[0];

            if (!file1 || !file2) {
                alert("두 사람의 사진을 모두 인화구에 넣어주세요!");
                return;
            }

            document.getElementById("upload-screen").style.display = "none";
            document.getElementById("loading-screen").style.display = "block";
            let loadingText = document.getElementById("loading-text");

            // 요청하신 로딩 멘트 4가지 반영
            setTimeout(() => { loadingText.innerHTML = "2015년의 새벽 공기 주입하는 중...<span class='cursor'>_</span>"; }, 1500);
            setTimeout(() => { loadingText.innerHTML = "서로를 바라보는 눈빛의 온도 계산 중...<span class='cursor'>_</span>"; }, 3000);
            setTimeout(() => { loadingText.innerHTML = "렌즈에 아련한 노이즈 한 꼬집 흩뿌리는 중...<span class='cursor'>_</span>"; }, 4500);
            setTimeout(() => { loadingText.innerHTML = "시공간을 구부려 렌즈에 욱여넣는 중...<span class='cursor'>_</span>"; }, 6000);

            try {
                const base64_1 = await getBase64(file1);
                const base64_2 = await getBase64(file2);

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image1: base64_1, image2: base64_2 })
                });

                const data = await response.json();

                if (data.error) {
                    alert("인화 실패: " + data.error);
                    retry();
                    return;
                }

                const resultImageUrl = data.output ? data.output[0] : "https://via.placeholder.com/300?text=Error";
                document.querySelector(".photo-frame").innerHTML = `<img src="${resultImageUrl}" style="max-width: 100%; max-height: 100%; border-radius: 5px;">`;

                document.getElementById("loading-screen").style.display = "none";
                document.getElementById("result-screen").style.display = "block";

            } catch (error) {
                alert("자판기 회선에 문제가 생겼습니다. 다시 시도해 주세요!");
                retry();
            }
        }

        function retry() {
            document.getElementById("result-screen").style.display = "none";
            document.getElementById("upload-screen").style.display = "block";
            document.getElementById("loading-text").innerHTML = "기억의 파편 모으는 중...<span class='cursor'>_</span>";
        }

            const messages = [

                "어두운 골목길을 밝혀주던 작은 가로등 불빛 ⚡",
                "사진 한 장에 담긴 수많은 밤들",

            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            const hashtag = "\n\n#6S_감성셀카";

    </script>
